{% set name = "chromadb" %}
{% set version = "1.5.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: 9f5dfaea989128793c4e1928de6a150d70ae55e44403d85448be94ff32f2c962
  - url: https://raw.githubusercontent.com/chroma-core/chroma/refs/tags/{{ version }}/LICENSE
    sha256: c71d239df91726fc519c6eb72d318ec65820627232b2f796219e87dcf35d0ab4
    folder: license-src

build:
  number: 0
  skip: true  # [py<310]
  script:
    # Windows MAX_PATH workaround: chromadb pulls in google-cloud-rust
    # whose nested googleapis .proto file path is ~130 chars on its own.
    # The conda build_prefix path (~70 chars) + the default
    # %BUILD_ENV%\.cargo.win\... layout pushes the total over 260 chars,
    # which is the NTFS limit unless LongPathsEnabled is set in the
    # registry. We can't change worker registry, so:
    #   1. Relocate CARGO_HOME to a very short root (C:\c) so the cache
    #      path is ~75 chars shorter.
    #   2. Enable libgit2 long-path support as a belt-and-suspenders
    #      measure (helps with checkouts that still flirt with the limit).
    - set CARGO_HOME=C:\c%PKG_HASH%  # [win]
    - git config --global core.longpaths true  # [win]
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses
    # libprotobuf provides protoc for the build (chromadb_rust_bindings emits .proto stubs)
    - libprotobuf
    - make  # [unix]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - python                                 # [build_platform != target_platform]
    - maturin >=1.0,<2                       # [build_platform != target_platform]
  host:
    - python
    - pip
    - maturin >=1.0,<2
    - setuptools >=61.0
    - setuptools-scm >=6.2
  run:
    - python
    # core install_requires from upstream pyproject.toml
    - python-build >=1.0.3
    - pydantic >=2.0
    - pydantic-settings >=2.0
    - pybase64 >=1.4.1
    - uvicorn >=0.18.3
    - uvicorn-standard >=0.18.3
    - numpy >=1.22.5
    - typing_extensions >=4.5.0
    # Pin to CPU variant: the CUDA build of onnxruntime registers its
    # PyPI metadata as 'onnxruntime-gpu', which makes 'pip check' miss
    # chromadb's 'onnxruntime' requirement. Users who want GPU
    # acceleration should install the CUDA variant explicitly.
    - onnxruntime >=1.14.1 *cpu*
    - opentelemetry-api >=1.2.0
    - opentelemetry-exporter-otlp-proto-grpc >=1.2.0
    - opentelemetry-sdk >=1.2.0
    - tokenizers >=0.13.2
    - pypika >=0.48.9
    - tqdm >=4.65.0
    - overrides >=7.3.1
    - importlib_resources
    - grpcio >=1.58.0
    - bcrypt >=4.0.1
    - typer >=0.9.0
    - python-kubernetes >=28.1.0
    - tenacity >=8.2.3
    - pyyaml >=6.0.0
    - mmh3 >=4.0.1
    - orjson >=3.9.12
    - httpx >=0.27.0
    - rich >=10.11.0
    - jsonschema >=4.19.0
    # Listed in upstream's [dev] extras but imported unconditionally in the
    # 1.5.8 source (server/fastapi, telemetry/opentelemetry/fastapi,
    # segment/impl/vector/local_hnsw); promote to hard runtime deps.
    - chroma-hnswlib ==0.7.6
    - fastapi >=0.115.9
    - opentelemetry-instrumentation-fastapi >=0.41b0

test:
  imports:
    - chromadb
    - chromadb.api
    - chromadb.server.fastapi
    - chromadb.telemetry.opentelemetry.fastapi
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://www.trychroma.com
  summary: "Chroma: The AI-native open-source embedding database"
  description: |
    Chroma is the open-source embedding database. Chroma makes it easy to
    build LLM apps by making knowledge, facts, and skills pluggable for
    LLMs. The Python package ships a Rust-accelerated core
    (chromadb_rust_bindings) plus a FastAPI server for hosted deployments.
  license: Apache-2.0
  license_family: APACHE
  license_file:
    - license-src/LICENSE
    - THIRDPARTY.yml
  doc_url: https://docs.trychroma.com
  dev_url: https://github.com/chroma-core/chroma

extra:
  recipe-maintainers:
    - sugatoray
    - xhochy
    - pavelzw
